apiVersion: v1
kind: Secret
metadata:
  name: food-delivery-secret
  namespace: {{ include "food-delivery.namespace" . }}
type: Opaque
stringData:
  DB_URL: {{ .Values.secrets.dbUrl | quote }}
  DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}