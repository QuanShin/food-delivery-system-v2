version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: food-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: foodauthdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - food-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: always
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/foodauthdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      JWT_SECRET: foodDeliverySystemSuperSecretKeyForJwtToken123456
    ports:
      - "8080:8080"
    networks:
      - food-network

  menu-service:
    build: ./services/menu-service
    container_name: menu-service
    restart: always
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/foodauthdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: admin
      DB_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - food-network

  order-service:
    build: ./services/order-service
    container_name: order-service
    restart: always
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/foodauthdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: admin
      DB_PASSWORD: admin123
    ports:
      - "8082:8082"
    networks:
      - food-network

  delivery-service:
    build: ./services/delivery-service
    container_name: delivery-service
    restart: always
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/foodauthdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: admin
      DB_PASSWORD: admin123
    ports:
      - "8083:8083"
    networks:
      - food-network

volumes:
  mysql_data:

networks:
  food-network:
    driver: bridge